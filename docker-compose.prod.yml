version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: caferez_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cafe_erez_betting}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: caferez_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE:-caferez-backend:latest}
    container_name: caferez_backend_prod
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: publish
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-cafe_erez_betting};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Sms__Provider: ${SMS_PROVIDER:-inforu}
      Sms__ApiKey: ${SMS_API_KEY}
      Sms__SenderId: ${SMS_SENDER_ID:-CafeErez}
      Frontend__Url: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ${FRONTEND_IMAGE:-caferez-frontend:latest}
    container_name: caferez_frontend_prod
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: caferez_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  internal:
    driver: bridge
