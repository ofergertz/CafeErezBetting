services:
  postgres:
    image: postgres:15-alpine
    container_name: caferez_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cafe_erez_betting}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: caferez_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: caferez_backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DOTNET_USE_POLLING_FILE_WATCHER: true
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-cafe_erez_betting};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-changeme}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-changeme}"
      Jwt__Secret: ${JWT_SECRET:-dev-secret-min-32-chars-here-ok}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Sms__Provider: ${SMS_PROVIDER:-inforu}
      Sms__ApiKey: ${SMS_API_KEY:-}
      Sms__SenderId: ${SMS_SENDER_ID:-CafeErez}
      Frontend__Url: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 240s
    volumes:
      - ./backend:/app
      # NuGet cache — survives container restarts, avoids re-downloading packages
      - ${USERPROFILE:-/tmp/nuget-packages}/.nuget/packages:/root/.nuget/packages
      # Roslyn/MSBuild obj cache — pre-built in image, survives volume-mount override.
      # On first run: populated from image's pre-build.
      # On subsequent runs: dotnet watch does incremental builds (~20s instead of ~3min).
      # To reset: docker-compose down -v
      - backend_obj_api:/app/src/CafeErezBetting.API/obj
      - backend_obj_core:/app/src/CafeErezBetting.Core/obj
      - backend_obj_infra:/app/src/CafeErezBetting.Infrastructure/obj
    command: dotnet watch run --project src/CafeErezBetting.API --no-launch-profile --no-restore

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: caferez_frontend
    environment:
      # BACKEND_URL has no VITE_ prefix — not exposed to browser,
      # used only by Vite proxy (server-side Node.js process)
      BACKEND_URL: http://backend:5000
      WS_BACKEND_URL: ws://backend:5000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
  backend_obj_api:
  backend_obj_core:
  backend_obj_infra:
