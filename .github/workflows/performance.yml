name: Frontend Performance (Bundle Size)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Check JS bundle size (512KB limit)
        run: |
          total=$(du -sb dist/assets/*.js 2>/dev/null | awk '{sum+=$1} END {print sum}')
          echo "Total JS: ${total} bytes"
          if [ "$total" -gt 524288 ]; then
            echo "❌ JS bundle exceeds 512KB: ${total} bytes"
            exit 1
          fi
          echo "✅ Bundle size OK: ${total} bytes"

      - name: Report total dist size
        run: |
          echo "Total dist size:"
          du -sh dist/
